# ─────────────────────────────────────────────────────────────
# Docker profile — activated automatically by the Dockerfile.
# All sensitive values are injected via environment variables.
#
# Override at runtime:
#   docker run -e DB_URL=... -e DB_USERNAME=... -e DB_PASSWORD=...
#   or via docker-compose environment: / env_file:
# ─────────────────────────────────────────────────────────────

# Database connection
spring.datasource.url=${DB_URL:jdbc:mysql://db:3306/hospital_management_system?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:hmsroot}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Preserve PascalCase table names — required for case-sensitive
# Linux MySQL (matches @Table(name = "Department") etc.)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server
server.port=8080

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.HospitalSystem=DEBUG
logging.level.org.hibernate.SQL=DEBUG
