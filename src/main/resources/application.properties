spring.application.name=HospitalSystem

# MySQL — start the server before running the app (Windows: Services -> MySQL, or use Docker profile below).
# If nothing listens on localhost:3306 you get "Connection refused" / "Communications link failure".
spring.datasource.url=jdbc:mysql://localhost:3306/HospitalManagementSystem?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
